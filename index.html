    <h1>Vladimir Lenin</h1>
    <p>Vladimir Ilyich Ulyanov, better known as Vladimir Lenin, was a Russian revolutionary, politician and political theorist. He was the first head of government of Soviet Russia from 1917 then of the Soviet Union from 1922 until his death in 1924.</p>
